<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TradeIQ India</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
                <h1>TradeIQ India</h1>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username" value="demo" required>
                    <label for="username">Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" value="demo123" required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" id="login-button">Login</button>
            </form>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script> <!-- Replace with your kit -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
